<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings - TitanNetwork</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="navbar-shared.css">
  <style>
    :root {
      --primary-bg: #0f1720;
      --card-bg: #16212e;
      --accent-color: #00bfff;
      --accent-light: #40d4ff;
      --text-color: #f0f0f0;
      --text-secondary: #a0aec0;
      --border-color: rgba(255, 255, 255, 0.1);
      --radius-lg: 12px;
      --radius-md: 8px;
    }

    body {
      background-color: var(--primary-bg);
      color: var(--text-color);
      font-family: 'Barlow', sans-serif;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: 120px auto 40px;
      padding: 0 20px;
    }

    .settings-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: 40px;
      position: relative;
    }

    .settings-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 15px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      color: white;
    }

    .form-input, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 15px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .form-textarea {
      height: 120px;
      resize: vertical;
    }

    .pfp-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 10px;
    }

    .pfp-option {
      border: 2px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .pfp-option:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .pfp-option.active {
      border-color: var(--accent-color);
      background: rgba(0, 191, 255, 0.05);
    }

    .pfp-option i {
      font-size: 2rem;
      margin-bottom: 10px;
      color: var(--accent-color);
    }

    .pfp-preview {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-md);
      margin: 15px auto 0;
      display: block;
      object-fit: cover;
      border: 2px solid var(--border-color);
    }

    .readonly-field {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .readonly-lbl {
      color: var(--text-secondary);
      font-weight: 600;
    }

    .readonly-val {
      color: white;
      font-weight: 700;
    }

    .settings-actions {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: var(--radius-md);
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-save {
      background: var(--accent-color);
      color: #003366;
      flex: 1;
    }

    .btn-save:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
    }

    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    #notification {
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 15px 25px;
        border-radius: var(--radius-md);
        display: none;
        animation: slideIn 0.3s ease;
        z-index: 10000;
        font-weight: 700;
    }

    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .notif-success { background: #10b981; color: white; }
    .notif-error { background: #ef4444; color: white; }

    @media (max-width: 600px) {
      .pfp-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <div id="navbar-placeholder"></div>

  <div class="container">
    <div class="settings-card">
      <h1 class="settings-title">Profile Settings</h1>
      
      <div id="settings-loading" style="text-align: center; padding: 40px;">
          <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--accent-color);"></i>
      </div>

      <div id="settings-form-content" style="display: none;">
          <!-- Profile Picture -->
          <div class="form-group">
            <label class="form-label">Profile Picture</label>
            <div class="pfp-options">
              <div class="pfp-option" id="opt-custom">
                <i class="fas fa-upload"></i>
                <div class="pfp-option-title">Upload Image</div>
              </div>
              <div class="pfp-option" id="opt-mc">
                <i class="fas fa-cubes"></i>
                <div class="pfp-option-title">Minecraft Skin</div>
              </div>
            </div>
            
            <div id="input-custom" style="margin-top: 15px; display: none;">
              <input type="file" id="pfp-file" class="form-input" accept="image/*">
              <small style="color: var(--text-secondary); margin-top: 5px; display: block;">Max size: 2MB. Format: JPG, PNG, GIF</small>
            </div>
            <div id="input-mc" style="margin-top: 15px; display: none;">
              <input type="text" id="mc-username" class="form-input" placeholder="Minecraft Username">
            </div>
            <img id="preview-img" src="" class="pfp-preview">
          </div>

          <!-- Bio -->
          <div class="form-group">
            <label class="form-label">About Me (Bio)</label>
            <textarea id="bio-input" class="form-textarea" placeholder="Tell us something about yourself..."></textarea>
          </div>

          <!-- Account Info (Read-only) -->
          <div class="form-group">
            <label class="form-label">Account Information</label>
            <div class="readonly-field">
              <span class="readonly-lbl">Email Address</span>
              <span id="email-val" class="readonly-val">---</span>
            </div>
            <div class="readonly-field">
              <span class="readonly-lbl">Joining Date</span>
              <span id="joined-val" class="readonly-val">---</span>
            </div>
            <div class="readonly-field">
              <span class="readonly-lbl">Total Posts</span>
              <span id="posts-val" class="readonly-val">---</span>
            </div>
          </div>

          <div class="settings-actions">
            <button id="cancel-btn" class="btn btn-cancel">Cancel</button>
            <button id="save-btn" class="btn btn-save">Save Changes</button>
          </div>
      </div>
    </div>
  </div>

  <div id="notification"></div>

  <script type="module" src="profile-settings-logic.js"></script>
</body>
</html>
