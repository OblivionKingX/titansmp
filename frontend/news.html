<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TitanNetwork - News</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="navbar-shared.css">
  <link rel="stylesheet" href="profile-card.css">
  <link rel="stylesheet" href="bbcode.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="news.css">
</head>

<body>
  <div id="notification-container"></div>

  <!-- Auth Modal (Standard) -->
  <div id="auth-modal" class="auth-modal" aria-hidden="true">
    <!-- Reused from index.html -->
    <div class="auth-content" role="dialog" aria-modal="true" aria-labelledby="auth-title">
      <button class="auth-close" type="button" onclick="closeAuthModal()">×</button>
      <h2 id="auth-title" style="color:white; margin-bottom: var(--space-md);">Account Access</h2>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
        <div class="auth-tab" onclick="switchAuthTab('register')">Register</div>
      </div>
      <form id="login-form" class="auth-form active">
        <div id="login-message" class="form-message"></div>
        <div class="form-group"><label for="login-email">Email</label><input id="login-email" type="email" class="form-control" required></div>
        <div class="form-group"><label for="login-password">Password</label><input id="login-password" type="password" class="form-control" required></div>
        <button id="login-btn" class="btn" type="submit">Login</button>
      </form>
      <form id="register-form" class="auth-form">
        <div id="register-message" class="form-message"></div>
        <div class="form-group"><label for="register-username">Username</label><input id="register-username" type="text" class="form-control" required></div>
        <div class="form-group"><label for="register-email">Email</label><input id="register-email" type="email" class="form-control" required></div>
        <div class="form-group"><label for="register-password">Password</label><input id="register-password" type="password" class="form-control" required></div>
        <button id="register-btn" class="btn" type="submit">Create Account</button>
      </form>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <img src="supreme_logo1.webp" alt="TitanNetwork Logo" style="height: 40px; border-radius: 8px;">
        <h1 style="color: #0088cc; text-shadow: 0px 0px 10px blue; margin: 0;">TitanNetwork</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="forums.html"><i class="fas fa-newspaper"></i> Forums</a></li>
        <li><a href="vote.html"><i class="fas fa-vote-yea"></i> Vote</a></li>
        <li><a href="team.html"><i class="fas fa-users"></i> Team</a></li>
        <li class="user-menu">
          <button class="user-btn" onclick="toggleUserMenu()">
            <span id="user-btn-content"><i class="fas fa-user"></i> Account</span>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <div class="user-info">
              <div class="user-name" id="user-name">Guest</div>
              <div class="user-role" id="user-role">Guest</div>
            </div>
            <a href="#" onclick="showAuthModal(); return false;" id="login-link">Login</a>
            <a href="#" id="logout-link" style="display:none;" onclick="logout(); return false;">Logout</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container news-page-container">
    <div class="news-full-wrapper">
      <aside class="news-sidebar" id="news-sidebar">
        <!-- Author Profile Card populated by JS -->
      </aside>

      <div class="news-main-content">
        <div class="news-content-area" id="news-content-area">
          <!-- Article populated by JS -->
          <div class="loading-state">
            <i class="fas fa-circle-notch fa-spin"></i> Loading Article...
          </div>
        </div>

        <div class="news-comments-section" id="news-comments-section">
          <div class="comments-header">
              <i class="fas fa-comments"></i> <span>Discussion & Comments</span>
          </div>
          
          <div id="comments-list" class="comments-list">
              <!-- Comments populated by JS -->
              <div class="loading-comments">
                  <i class="fas fa-circle-notch fa-spin"></i> Loading comments...
              </div>
          </div>

          <div class="comment-form-container" id="comment-form-container">
              <!-- Form populated by JS to handle auth state -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 TitanNetwork. All rights reserved.</p>
    </div>
  </footer>

  <script src="bbcode.js"></script>
  <script src="utils.js"></script>
  <script type="module" src="news-logic.js"></script>
</body>
</html>
