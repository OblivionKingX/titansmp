name: Minecraft Leaderboard Sync

on:
  schedule:
    # Runs every 10 minutes (fastest reliable interval for free tier)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub website

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rcon-bridge/package-lock.json

      - name: Install dependencies
        run: |
          cd rcon-bridge
          npm ci

      - name: Run sync
        env:
          # These will be pulled from your GitHub Secrets
          RCON_HOST: ${{ secrets.RCON_HOST }}
          RCON_PORT: ${{ secrets.RCON_PORT }}
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
          UPDATE_INTERVAL: 60000
          STATS_OBJECTIVES: ${{ secrets.STATS_OBJECTIVES }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          # We'll pass the service account JSON as a secret
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          cd rcon-bridge
          # Run the script
          node src/sync-once.js
