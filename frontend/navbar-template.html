<!-- Unified Auth Modal -->
<div id="auth-modal" class="auth-modal" aria-hidden="true">
  <div class="auth-content" role="dialog" aria-modal="true" aria-labelledby="auth-title" onclick="event.stopPropagation()">
    <button class="auth-close" type="button" onclick="closeAuthModal()" aria-label="Close">×</button>
    <h2 id="auth-title" style="color:white; margin-bottom: 1rem;">Account Access</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">Register</div>
    </div>
    <form id="login-form" class="auth-form active">
      <div id="login-message" class="form-message"></div>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" class="form-control" placeholder="Enter your password" minlength="6" required>
      </div>
      <button id="login-btn" class="btn" type="submit" style="width:100%;background:var(--accent-color);color:#003366;font-weight:700;border-radius:var(--radius-md);padding:0.75rem;">Login</button>
    </form>
    <form id="register-form" class="auth-form">
      <div id="register-message" class="form-message"></div>
      <div class="form-group">
        <label for="register-username">Username</label>
        <input id="register-username" type="text" class="form-control" placeholder="Choose a username" minlength="3" maxlength="20" required>
      </div>
      <div class="form-group">
        <label for="register-email">Email</label>
        <input id="register-email" type="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="register-password">Password</label>
        <input id="register-password" type="password" class="form-control" placeholder="Create a password" minlength="6" required>
      </div>
      <div class="form-group">
        <label for="register-confirm-password">Confirm Password</label>
        <input id="register-confirm-password" type="password" class="form-control" placeholder="Re-enter your password" minlength="6" required>
      </div>
      <button id="register-btn" class="btn" type="submit" style="width:100%;background:var(--accent-color);color:#003366;font-weight:700;border-radius:var(--radius-md);padding:0.75rem;">Create Account</button>
    </form>
  </div>
</div>
