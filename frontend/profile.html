<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - TitanNetwork</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="navbar-shared.css">
  <link rel="stylesheet" href="profile-card.css">
  <style>
    :root {
      --primary-bg: #0f1720;
      --card-bg: #16212e;
      --accent-color: #00bfff;
      --accent-light: #40d4ff;
      --text-color: #f0f0f0;
      --text-secondary: #a0aec0;
      --border-color: rgba(255, 255, 255, 0.1);
      --radius-lg: 12px;
      --radius-md: 8px;
    }

    body {
      background-color: var(--primary-bg);
      color: var(--text-color);
      font-family: 'Barlow', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 120px auto 40px;
      padding: 0 20px;
    }

    /* Profile Header */
    .profile-header {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: 40px;
      display: flex;
      gap: 40px;
      align-items: center;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    .profile-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--accent-color), #0077ff);
    }

    .profile-pfp {
      width: 150px;
      height: 150px;
      border-radius: var(--radius-lg);
      border: 4px solid var(--border-color);
      object-fit: cover;
      background: #0a1118;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: white;
    }

    .profile-ranks {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .profile-bio {
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 1.1rem;
      max-width: 600px;
    }

    .profile-stats {
      display: flex;
      gap: 30px;
    }

    .stat-box {
      background: rgba(255,255,255,0.03);
      padding: 15px 25px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      text-align: center;
    }

    .stat-val {
      display: block;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-light);
    }

    .stat-lbl {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* Tabs/Content */
    .profile-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 700;
      padding: 10px 20px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .tab-btn.active {
      color: var(--accent-color);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -11px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-color);
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .activity-item {
      background: var(--card-bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      padding: 20px;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .activity-item:hover {
      transform: translateX(5px);
      border-color: var(--accent-color);
    }

    .activity-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .activity-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .activity-preview {
      color: var(--text-secondary);
      font-size: 0.95rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-type-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 800;
      margin-right: 10px;
    }

    .tag-thread { background: rgba(0, 191, 255, 0.1); color: var(--accent-color); }
    .tag-reply { background: rgba(255, 255, 255, 0.1); color: white; }

    .tag-thread { background: rgba(0, 191, 255, 0.1); color: var(--accent-color); }
    .tag-reply { background: rgba(255, 255, 255, 0.1); color: white; }

    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
        padding: 40px 20px;
      }
      .profile-ranks { justify-content: center; }
      .profile-stats { justify-content: center; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- Navigation Placeholder (Injected by navbar-logic.js) -->
  <div id="navbar-placeholder"></div>

  <div class="container" id="profile-container">
    <div id="profile-loading" style="text-align: center; padding: 100px;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--accent-color);"></i>
        <p style="margin-top: 20px;">Fetching user data...</p>
    </div>

    <div id="profile-content" style="display: none;">
        <!-- Profile Header -->
        <div class="profile-header">
            <img id="pfp-display" src="" class="profile-pfp" alt="PFP">
            <div class="profile-info">
                <h1 id="nickname-display" class="profile-name">---</h1>
                <div id="ranks-display" class="profile-ranks"></div>
                <p id="bio-display" class="profile-bio"></p>
                
                </div>
            </div>
            <div class="profile-stats">
                <div class="stat-box">
                    <span id="joined-display" class="stat-val">---</span>
                    <span class="stat-lbl">Joined</span>
                </div>
                <div class="stat-box">
                    <span id="posts-display" class="stat-val">---</span>
                    <span class="stat-lbl">Posts</span>
                </div>
                <div class="stat-box" id="gold-stat-box" style="display: none;">
                    <span id="gold-display" class="stat-val" style="color: #ffd700;">0</span>
                    <span class="stat-lbl"><i class="fas fa-coins"></i> Gold</span>
                </div>
                <div class="stat-box" id="points-stat-box" style="display: none;">
                    <span id="points-display" class="stat-val" style="color: #00ccff;">0</span>
                    <span class="stat-lbl"><i class="fas fa-star"></i> Points</span>
                </div>
            </div>
        </div>

        <!-- Activity Section -->
        <div class="profile-tabs">
            <button class="tab-btn active" id="activity-tab-btn" onclick="switchProfileTab('activity')">Recent Activity</button>
            <button class="tab-btn" id="points-tab-btn" onclick="switchProfileTab('points')" style="display: none;">Points History</button>
        </div>

        <div id="activity-list" class="activity-list">
            <!-- Items injected here -->
        </div>

        <div id="points-history-list" class="activity-list" style="display: none;">
            <!-- Point transactions injected here -->
        </div>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script type="module" src="profile-logic.js"></script>
</body>
</html>
